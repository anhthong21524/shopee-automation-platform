version: '3.9'

services:
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - MONGODB_URI=${MONGODB_URI}
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
    restart: unless-stopped
